<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Noor's To-Do List</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #f4f4f9;
    display: flex;
    justify-content: center;
    padding-top: 50px;
  }
  .container {
    background: white;
    padding: 30px;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
    width: 320px;
  }
  h1 {
    font-size: 22px;
    text-align: center;
    color: #333;
  }
  input {
    width: 70%;
    padding: 8px;
    border: 1px solid #ccc;
    border-radius: 5px;
  }
  button {
    padding: 8px 12px;
    border: none;
    background: #4CAF50;
    color: white;
    border-radius: 5px;
    cursor: pointer;
  }
  ul {
    list-style: none;
    padding: 0;
    margin-top: 15px;
  }
  li {
    background: #f9f9f9;
    margin: 6px 0;
    padding: 10px;
    border-radius: 5px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  li.done span {
    text-decoration: line-through;
    color: gray;
  }
  .delete-btn {
    background: #e74c3c;
    border: none;
    color: white;
    padding: 4px 8px;
    border-radius: 4px;
    cursor: pointer;
  }
  #counter {
    text-align: center;
    margin-top: 12px;
    font-size: 13px;
    color: #666;
  }
</style>
</head>
<body>

<div class="container">
  <h1>Noor's To-Do List</h1>
  <div>
    <input type="text" id="taskInput" placeholder="Add a new task">
    <button onclick="addTask()">Add</button>
  </div>
  <ul id="taskList"></ul>
  <div id="counter">0 tasks left</div>
</div>

<script>
  function addTask() {
    const input = document.getElementById("taskInput");
    const text = input.value.trim();
    if (text === "") return;

    const li = document.createElement("li");
    const span = document.createElement("span");
    span.textContent = text;
    span.onclick = () => {
      li.classList.toggle("done");
      updateCounter();
    };

    const delBtn = document.createElement("button");
    delBtn.textContent = "x";
    delBtn.className = "delete-btn";
    delBtn.onclick = () => {
      li.remove();
      updateCounter();
    };

    li.appendChild(span);
    li.appendChild(delBtn);
    document.getElementById("taskList").appendChild(li);

    input.value = "";
    updateCounter();
  }

  function updateCounter() {
    const items = document.querySelectorAll("#taskList li");
    const remaining = document.querySelectorAll("#taskList li:not(.done)").length;
    document.getElementById("counter").textContent =
      `${remaining} task${remaining === 1 ? "" : "s"} left (${items.length} total)`;
  }
</script>

</body>
</html>
